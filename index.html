<html lang="en">
              <span class="trait">Old-school</span>
            </div>
          </div>
        </article>

        <article class="card">
          <div class="card-head">
            <h2>Material</h2>
            <div class="card-desc">
              Upload optional study files.
            </div>
          </div>

          <label class="upload-box" for="file-input">
            <div class="upload-title">Choose files</div>
            <div class="upload-hint">
              TXT, MD and CSV files are read directly.
            </div>

            <input id="file-input" type="file" multiple hidden>
          </label>

          <div class="file-list" id="file-list"></div>
        </article>

        <article class="card">
          <div class="card-head">
            <h2>Case Setup</h2>
            <div class="card-desc">
              Configure the investigation.
            </div>
          </div>

          <div class="field">
            <label>Topic</label>

            <textarea
              id="topic-ta"
              placeholder="Paste your topic, exam material, or learning goals..."
              oninput="updateCount(this)"
            ></textarea>

            <div class="char-count" id="char-count">0 / 2,000</div>
          </div>

          <div class="field">
            <label>Mode</label>

            <div class="seg">
              <button class="seg-item on">Cold Case</button>
              <button class="seg-item">Murder</button>
              <button class="seg-item">Conspiracy</button>
              <button class="seg-item">Heist</button>
            </div>
          </div>

          <div class="row-2">
            <div class="field">
              <label>Language</label>

              <select id="lesson-language">
                <option>English</option>
                <option>German</option>
                <option>Polish</option>
                <option>French</option>
              </select>
            </div>

            <div class="field">
              <label>Length</label>

              <select id="lesson-length">
                <option>Short</option>
                <option selected>Medium</option>
                <option>Long</option>
              </select>
            </div>
          </div>

          <div class="row-2">
            <div class="field">
              <label>School Type</label>

              <input id="lesson-school" placeholder="e.g. Gymnasium">
            </div>

            <div class="field">
              <label>Grade</label>

              <input id="lesson-grade" placeholder="e.g. Grade 10">
            </div>
          </div>

          <div class="field difficulty">
            <label>Difficulty</label>

            <div class="seg">
              <button class="seg-item">Gentle</button>
              <button class="seg-item on">Balanced</button>
              <button class="seg-item">Hard</button>
              <button class="seg-item">Brutal</button>
            </div>
          </div>

          <button class="btn-primary" onclick="send()">
            Generate Case
          </button>
        </article>
      </div>
    </div>
  </main>
</div>

<script src="script.js"></script>
</body>
</html>
