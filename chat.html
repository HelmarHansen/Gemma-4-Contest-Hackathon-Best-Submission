<!doctype html>
<html lang="en" data-mood="neutral">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>MindHeist — Session</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="chat.css">

<!--

-->

      "bg":           "#10181a",

</head>
<body>

<div class="app">

  <!-- ============ SIDEBAR ============ -->
  <aside class="sidebar">
    <div class="brand">
      <div class="mark" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="8" cy="12" r="3.4"/>
          <path d="M11.4 12H20"/>
          <path d="M17 12v3"/>
          <path d="M20 12v2.5"/>
        </svg>
      </div>
      <div>
        <div class="name">Mind<em>Heist</em></div>
        <div class="meta">Powered by Gemma 4</div>
      </div>
    </div>

    <a class="back-btn" href="/">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      Back to library
    </a>

    <h3>Scenes in this session</h3>

    <div class="scenes" id="scenes-list"></div>

    <div class="sidebar-foot">
      <div class="avatar">?</div>
      <div class="who">
        <div class="n">Student</div>
        <div class="p">Local — Gemma 4</div>
      </div>
    </div>
  </aside>

  <!-- ============ CHAT ============ -->
  <main class="main">

    <header class="topbar">
      <div class="teacher-card">
        <div class="teacher-portrait" aria-hidden="true">
          <svg viewBox="0 0 100 100" fill="currentColor">
            <circle cx="50" cy="38" r="18"/>
            <path d="M16 100c0-20 15-36 34-36s34 16 34 36z"/>
          </svg>
        </div>
        <div class="teacher-meta">
          <div class="name" id="teacher-name">—</div>
          <div class="role">
            <span class="dot"></span>
            <span id="teacher-role">—</span>
          </div>
        </div>
      </div>
      <div class="top-actions">
        <span class="mood-pill" id="mood-pill">
          <span class="swatch"></span>
          Mood <em id="mood-label">—</em>
        </span>
        <button class="icon-btn" title="End session" id="end-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
    </header>

    <section class="transcript" id="transcript">
      <div class="feed" id="feed"></div>
    </section>

    <div class="composer-wrap">
      <div class="composer">
        <textarea id="composer-input" rows="1" placeholder="Your response…"></textarea>
        <div class="composer-tools">
          <button class="icon-btn" title="Hint" id="hint-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M9.5 9a2.5 2.5 0 1 1 3.5 2.3c-.7.4-1 .9-1 1.7"/><circle cx="12" cy="17" r=".6" fill="currentColor"/></svg>
          </button>
          <button class="send-btn" id="send-btn" title="Send">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13"/><path d="M22 2l-7 20-4-9-9-4z"/></svg>
          </button>
        </div>
      </div>
      <div class="composer-hint">
        <span><span class="kbd">⏎</span> send · <span class="kbd">⇧</span><span class="kbd">⏎</span> new line</span>
        <span>Gemma 4 · on-device</span>
      </div>
    </div>

  </main>
</div>

<script src="chat.js"></script>
</body>
</html>
